<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque — Quality Burger</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#D0401A;--brand-dark:#A8300F;
  --bg:#0D0D0D;--bg2:#1A1A1A;--bg3:#242424;--bg4:#2e2e2e;
  --text:#F5F0E8;--text2:#B0A898;
  --gold:#F2A92B;--green:#2ECC71;--red:#E74C3C;--yellow:#F39C12;--radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--bg2);border-radius:20px;padding:40px 32px;width:100%;max-width:360px;border:1.5px solid #2a2a2a;text-align:center;}
.login-box h1{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--brand);margin-bottom:6px;}
.login-box p{font-size:13px;color:var(--text2);margin-bottom:28px;}
.login-input{width:100%;padding:13px 16px;background:var(--bg3);border:1.5px solid #333;border-radius:var(--radius);color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;margin-bottom:12px;}
.login-input:focus{outline:none;border-color:var(--brand);}
.btn-brand{width:100%;padding:13px;background:var(--brand);border:none;border-radius:50px;color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:background .2s;}
.btn-brand:hover{background:var(--brand-dark);}
#login-erro{color:var(--red);font-size:13px;margin-top:10px;display:none;}

/* TOPBAR */
#app{display:none;}
#topbar{background:var(--bg2);border-bottom:1.5px solid #2a2a2a;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
#topbar h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--brand);}
.btn-sair{background:var(--bg3);border:1px solid #333;color:var(--text2);padding:7px 14px;border-radius:50px;cursor:pointer;font-size:12px;font-family:'Nunito',sans-serif;}

/* TABS */
#tabs{display:flex;gap:6px;padding:14px 16px 0;overflow-x:auto;scrollbar-width:none;}
#tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;padding:9px 16px;border-radius:50px;border:1.5px solid #333;background:var(--bg2);color:var(--text2);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab-btn.ativo{background:var(--brand);border-color:var(--brand);color:#fff;}

/* CONTEÚDO */
#conteudo{padding:16px;max-width:800px;margin:0 auto;}
.secao{display:none;}
.secao.ativa{display:block;}
.secao-titulo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--brand);margin-bottom:16px;}

/* ALERTAS */
.alerta{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius);margin-bottom:10px;}
.alerta.vencido{background:#3d1414;border:1.5px solid var(--red);}
.alerta.vencendo{background:#3d2c0a;border:1.5px solid var(--yellow);}
.alerta.zerado{background:#3d1414;border:1.5px solid var(--red);}
.alerta.baixo{background:#2a2a0a;border:1.5px solid var(--gold);}
.alerta-icon{font-size:24px;flex-shrink:0;}
.alerta-texto{flex:1;font-size:13px;font-weight:700;}

/* CARDS RESUMO */
.resumo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
.resumo-card{background:var(--bg2);border-radius:var(--radius);padding:16px;border:1.5px solid #2a2a2a;text-align:center;}
.resumo-num{font-family:'Bebas Neue',sans-serif;font-size:32px;}
.resumo-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;}

/* PRODUTOS */
.produto-card{background:var(--bg2);border-radius:var(--radius);border:1.5px solid #2a2a2a;margin-bottom:10px;overflow:hidden;}
.produto-card.alerta-vencendo{border-color:var(--yellow);}
.produto-card.alerta-vencido{border-color:var(--red);}
.produto-card.alerta-zerado{border-color:var(--red);opacity:.7;}
.produto-card.alerta-baixo{border-color:var(--gold);}
.produto-header{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;}
.produto-foto{width:56px;height:56px;border-radius:10px;object-fit:cover;background:var(--bg3);flex-shrink:0;}
.produto-info{flex:1;}
.produto-nome{font-size:14px;font-weight:800;margin-bottom:2px;}
.produto-cat{font-size:11px;color:var(--text2);}
.produto-qtd{font-size:18px;font-weight:800;text-align:right;}
.produto-unit{font-size:11px;color:var(--text2);}
.produto-body{padding:0 14px 14px;display:none;border-top:1px solid #2a2a2a;padding-top:12px;}
.produto-body.aberto{display:block;}
.info-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #222;}
.info-label{color:var(--text2);}
.info-val{font-weight:700;}
.prod-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.btn-mov{padding:8px 16px;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;}
.btn-entrada{background:var(--green);color:#fff;}
.btn-saida{background:#555;color:#fff;}
.btn-editar{background:var(--bg4);border:1.5px solid #444;color:var(--text2);}
.btn-del{background:none;border:1.5px solid var(--red);color:var(--red);}

/* BUSCA E FILTRO */
.busca-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.busca-input{flex:1;min-width:150px;padding:10px 14px;background:var(--bg2);border:1.5px solid #333;border-radius:50px;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;}
.busca-input:focus{outline:none;border-color:var(--brand);}
.filtro-select{padding:10px 14px;background:var(--bg2);border:1.5px solid #333;border-radius:50px;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;cursor:pointer;}

/* FORMULÁRIO */
.form-card{background:var(--bg2);border-radius:var(--radius);padding:20px;border:1.5px solid #2a2a2a;margin-bottom:14px;}
.form-label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:6px;}
.form-input{width:100%;padding:11px 14px;background:var(--bg3);border:1.5px solid #333;border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;margin-bottom:14px;}
.form-input:focus{outline:none;border-color:var(--brand);}
.form-select{width:100%;padding:11px 14px;background:var(--bg3);border:1.5px solid #333;border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;margin-bottom:14px;cursor:pointer;}
.form-select option{background:var(--bg3);}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-textarea{width:100%;padding:11px 14px;background:var(--bg3);border:1.5px solid #333;border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;min-height:80px;resize:vertical;margin-bottom:14px;}
.btn-salvar{padding:13px 28px;background:var(--green);border:none;border-radius:50px;color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
.btn-cancelar{padding:13px 28px;background:var(--bg3);border:1.5px solid #444;border-radius:50px;color:var(--text2);font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
.btn-novo{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--bg3);border:2px dashed #333;border-radius:var(--radius);color:var(--text2);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:16px;}
.btn-novo:hover{border-color:var(--brand);color:var(--text);}

/* FOTO UPLOAD */
.foto-upload{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.foto-preview{width:70px;height:70px;border-radius:10px;object-fit:cover;background:var(--bg3);border:2px solid #333;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;}
.btn-foto{padding:10px 18px;background:var(--brand);border:none;border-radius:50px;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;}

/* MOVIMENTAÇÕES */
.mov-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg2);border-radius:var(--radius);border:1.5px solid #2a2a2a;margin-bottom:8px;}
.mov-tipo{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.mov-tipo.entrada{background:#1a3d1a;}
.mov-tipo.saida{background:#3d1a1a;}
.mov-info{flex:1;}
.mov-nome{font-size:13px;font-weight:700;}
.mov-det{font-size:11px;color:var(--text2);}
.mov-qtd{font-size:14px;font-weight:800;}
.mov-qtd.entrada{color:var(--green);}
.mov-qtd.saida{color:var(--red);}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto;padding:20px 16px;}
#modal-overlay.open{display:flex;align-items:flex-start;justify-content:center;}
#modal-box{background:var(--bg2);border-radius:20px;width:100%;max-width:480px;padding:24px;margin-top:20px;}
#modal-titulo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--brand);margin-bottom:16px;}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:700;z-index:999;transition:transform .3s;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}

/* LOADING */
.loading-box{text-align:center;padding:40px;color:var(--text2);}
.spinner{width:36px;height:36px;border:3px solid #333;border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:480px){.resumo-grid{grid-template-columns:repeat(2,1fr);}.form-row-2{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>ESTOQUE</h1>
    <p>Quality Burger — Controle de Estoque</p>
    <input type="text" class="login-input" id="login-user" placeholder="Usuário">
    <input type="password" class="login-input" id="login-pass" placeholder="Senha">
    <button class="btn-brand" onclick="fazerLogin()">Entrar</button>
    <div id="login-erro">Usuário ou senha incorretos.</div>
    <p style="font-size:11px;color:#444;margin-top:16px;">Padrão: admin / 1234</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="topbar">
    <h1>📦 ESTOQUE</h1>
    <button class="btn-sair" onclick="fazerLogout()">Sair</button>
  </div>

  <div id="tabs">
    <button class="tab-btn ativo" onclick="trocarTab('painel',this)">🏠 Painel</button>
    <button class="tab-btn" onclick="trocarTab('produtos',this)">📦 Produtos</button>
    <button class="tab-btn" onclick="trocarTab('movimentacoes',this)">🔄 Movimentações</button>
    <button class="tab-btn" onclick="trocarTab('categorias',this)">🗂️ Categorias</button>
  </div>

  <div id="conteudo">

    <!-- PAINEL -->
    <div id="sec-painel" class="secao ativa">
      <div class="secao-titulo">Painel</div>
      <div class="resumo-grid">
        <div class="resumo-card"><div class="resumo-num" id="res-total" style="color:var(--brand);">0</div><div class="resumo-label">Produtos</div></div>
        <div class="resumo-card"><div class="resumo-num" id="res-alertas" style="color:var(--red);">0</div><div class="resumo-label">Alertas</div></div>
        <div class="resumo-card"><div class="resumo-num" id="res-vencendo" style="color:var(--yellow);">0</div><div class="resumo-label">Vencendo</div></div>
        <div class="resumo-card"><div class="resumo-num" id="res-zerado" style="color:var(--text2);">0</div><div class="resumo-label">Sem estoque</div></div>
      </div>
      <div id="lista-alertas"><div class="loading-box"><div class="spinner"></div>Carregando alertas...</div></div>
    </div>

    <!-- PRODUTOS -->
    <div id="sec-produtos" class="secao">
      <div class="secao-titulo">Produtos</div>
      <button class="btn-novo" onclick="abrirFormProduto()">＋ Adicionar produto</button>
      <div class="busca-row">
        <input type="text" class="busca-input" id="busca-input" placeholder="🔍 Buscar produto..." oninput="filtrarProdutos()">
        <select class="filtro-select" id="filtro-cat" onchange="filtrarProdutos()">
          <option value="">Todas categorias</option>
        </select>
      </div>
      <div id="lista-produtos"><div class="loading-box"><div class="spinner"></div>Carregando...</div></div>
    </div>

    <!-- MOVIMENTAÇÕES -->
    <div id="sec-movimentacoes" class="secao">
      <div class="secao-titulo">Movimentações</div>
      <div id="lista-movimentacoes"><div class="loading-box"><div class="spinner"></div>Carregando...</div></div>
    </div>

    <!-- CATEGORIAS -->
    <div id="sec-categorias" class="secao">
      <div class="secao-titulo">Categorias</div>
      <div id="lista-categorias-edit"></div>
      <button class="btn-novo" onclick="novaCategoria()">＋ Nova categoria</button>
      <br>
      <button class="btn-salvar" onclick="salvarCategorias()">💾 Salvar categorias</button>
    </div>

  </div>
</div>

<!-- MODAL PRODUTO/MOVIMENTAÇÃO -->
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-titulo">Produto</div>
    <div id="modal-conteudo"></div>
  </div>
</div>

<div id="toast">✅ Salvo!</div>

<script>
// ===== CONFIG =====
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuQFh4rH7wXVO5f6Wm6T4W3rH-TXdZpEonmhoNs2qmrKzLA240v9MttqvlE_si6B3B1A/exec";
const CLOUDINARY_CLOUD = "djdl6hnvy";
const CLOUDINARY_PRESET = "WhatsApp_Video_2026-04-23_at_00.37.34_1_wsu2lr";

// ===== ESTADO =====
let produtos = [];
let movimentacoes = [];
let categorias = [];
let produtoEditando = null;

// ===== LOCAL =====
function salvarLocal(k,v){localStorage.setItem('est_'+k,JSON.stringify(v));}
function carregarLocal(k,def){try{const d=localStorage.getItem('est_'+k);return d?JSON.parse(d):def;}catch{return def;}}

// ===== JSONP =====
function chamarGet(params){
  return new Promise((resolve,reject)=>{
    const cb='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const t=setTimeout(()=>{delete window[cb];reject(new Error("Timeout"));},12000);
    window[cb]=(data)=>{clearTimeout(t);delete window[cb];resolve(data);};
    const qs=Object.entries({...params,callback:cb}).map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join('&');
    const s=document.createElement('script');
    s.src=`${SCRIPT_URL}?${qs}`;
    s.onerror=()=>{clearTimeout(t);delete window[cb];reject(new Error("Erro de conexão"));};
    document.head.appendChild(s);
    setTimeout(()=>s.remove(),15000);
  });
}
function chamarPost(body){
  return fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(body)}).then(r=>r.json());
}

// ===== TOAST =====
function toast(msg="✅ Salvo!",cor="var(--green)"){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.background=cor;
  t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2800);
}

// ===== LOGIN =====
document.getElementById("login-user").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("login-pass").focus();});
document.getElementById("login-pass").addEventListener("keydown",e=>{if(e.key==="Enter")fazerLogin();});

function fazerLogin(){
  const u=document.getElementById("login-user").value.trim();
  const s=document.getElementById("login-pass").value;
  const creds=carregarLocal("credenciais",{usuario:"admin",senha:"1234"});
  if(u===creds.usuario&&s===creds.senha){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app").style.display="block";
    carregarTudo();
  }else{
    document.getElementById("login-erro").style.display="block";
  }
}
function fazerLogout(){
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("app").style.display="none";
}

// ===== TABS =====
function trocarTab(id,btn){
  document.querySelectorAll(".secao").forEach(s=>s.classList.remove("ativa"));
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("ativo"));
  document.getElementById("sec-"+id).classList.add("ativa");
  btn.classList.add("ativo");
  if(id==="movimentacoes") carregarMovimentacoes();
}

// ===== CARREGAR TUDO =====
async function carregarTudo(){
  try {
    const [resProd, resCat, resAlertas] = await Promise.all([
      chamarGet({acao:"produtos"}),
      chamarGet({acao:"categorias"}),
      chamarGet({acao:"alertas"}),
    ]);
    if(resProd.ok) produtos = resProd.produtos || [];
    if(resCat.ok) categorias = resCat.categorias || [];
    if(resAlertas.ok) renderizarAlertas(resAlertas.alertas || []);
    renderizarProdutos();
    renderizarFiltroCategoria();
    renderizarCategorias();
  } catch(e) {
    toast("❌ Erro ao carregar dados","var(--red)");
  }
}

// ===== ALERTAS =====
function renderizarAlertas(alertas){
  const lista = document.getElementById("lista-alertas");
  document.getElementById("res-total").textContent = produtos.length;
  document.getElementById("res-alertas").textContent = alertas.filter(a=>a.tipo==="vencido"||a.tipo==="zerado").length;
  document.getElementById("res-vencendo").textContent = alertas.filter(a=>a.tipo==="vencendo").length;
  document.getElementById("res-zerado").textContent = alertas.filter(a=>a.tipo==="zerado").length;

  if(!alertas.length){
    lista.innerHTML=`<div style="text-align:center;padding:30px;color:var(--green);font-size:15px;">✅ Tudo certo! Nenhum alerta no momento.</div>`;
    return;
  }
  const icons={vencido:"🚨",vencendo:"⚠️",zerado:"❌",baixo:"📉"};
  lista.innerHTML=alertas.map(a=>`
    <div class="alerta ${a.tipo}" onclick="trocarTabProduto('${a.id}')">
      <div class="alerta-icon">${icons[a.tipo]||"⚠️"}</div>
      <div class="alerta-texto">${a.mensagem}</div>
      <div style="font-size:11px;color:var(--text2);">Ver ›</div>
    </div>
  `).join("");
}

function trocarTabProduto(id){
  trocarTab("produtos", document.querySelectorAll(".tab-btn")[1]);
  setTimeout(()=>{
    const el=document.getElementById("prod-"+id);
    if(el){el.scrollIntoView({behavior:"smooth"});el.querySelector(".produto-header").click();}
  },300);
}

// ===== PRODUTOS =====
function renderizarProdutos(){
  const busca=document.getElementById("busca-input").value.toLowerCase();
  const catFiltro=document.getElementById("filtro-cat").value;
  const lista=document.getElementById("lista-produtos");
  let filtrados=produtos.filter(p=>{
    const matchBusca=!busca||p.nome.toLowerCase().includes(busca)||String(p.fornecedor||"").toLowerCase().includes(busca);
    const matchCat=!catFiltro||p.categoria===catFiltro;
    return matchBusca&&matchCat;
  });
  if(!filtrados.length){lista.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text2);">Nenhum produto encontrado.</div>`;return;}

  const hoje=new Date();
  lista.innerHTML=filtrados.map(p=>{
    const qtd=parseFloat(p.quantidade)||0;
    const qtdMin=parseFloat(p.quantidade_minima)||0;
    const val=p.validade?new Date(p.validade):null;
    const dias=val?Math.ceil((val-hoje)/(1000*60*60*24)):null;
    let cardClass="";
    let badge="";
    if(qtd<=0){cardClass="alerta-zerado";badge=`<span style="background:var(--red);color:#fff;padding:2px 8px;border-radius:50px;font-size:10px;font-weight:800;">SEM ESTOQUE</span>`;}
    else if(qtdMin>0&&qtd<=qtdMin){cardClass="alerta-baixo";badge=`<span style="background:var(--gold);color:#000;padding:2px 8px;border-radius:50px;font-size:10px;font-weight:800;">ESTOQUE BAIXO</span>`;}
    if(dias!==null&&dias<=0){cardClass="alerta-vencido";badge+=`<span style="background:var(--red);color:#fff;padding:2px 8px;border-radius:50px;font-size:10px;font-weight:800;margin-left:4px;">VENCIDO</span>`;}
    else if(dias!==null&&dias<=7){cardClass="alerta-vencendo";badge+=`<span style="background:var(--yellow);color:#000;padding:2px 8px;border-radius:50px;font-size:10px;font-weight:800;margin-left:4px;">VENCE EM ${dias}d</span>`;}

    const validadeTexto=val?val.toLocaleDateString("pt-BR"):"Não informada";
    const valorTexto=parseFloat(p.valor_unitario)?`R$ ${parseFloat(p.valor_unitario).toFixed(2).replace(".",",")}`:"—";
    const qtdCor=qtd<=0?"var(--red)":qtdMin>0&&qtd<=qtdMin?"var(--gold)":"var(--green)";

    return `
    <div class="produto-card ${cardClass}" id="prod-${p.id}">
      <div class="produto-header" onclick="toggleProduto('${p.id}')">
        <img class="produto-foto" src="${p.foto||''}" alt="" onerror="this.innerHTML='📦';this.style.display='flex';this.style.alignItems='center';this.style.justifyContent='center';this.style.fontSize='24px';">
        <div class="produto-info">
          <div class="produto-nome">${p.nome} ${badge}</div>
          <div class="produto-cat">${p.categoria||"—"} • ${p.local||"Sem local"}</div>
        </div>
        <div style="text-align:right;">
          <div class="produto-qtd" style="color:${qtdCor};">${qtd}</div>
          <div class="produto-unit">${p.unidade||""}</div>
        </div>
      </div>
      <div class="produto-body" id="body-${p.id}">
        <div class="info-row"><span class="info-label">Fornecedor</span><span class="info-val">${p.fornecedor||"—"}</span></div>
        <div class="info-row"><span class="info-label">Valor unitário</span><span class="info-val">${valorTexto}</span></div>
        <div class="info-row"><span class="info-label">Validade</span><span class="info-val" style="${dias!==null&&dias<=7?"color:var(--red);":""}">${validadeTexto}${dias!==null?` (${dias}d)`:""}</span></div>
        <div class="info-row"><span class="info-label">Qtd mínima</span><span class="info-val">${p.quantidade_minima||"—"} ${p.unidade||""}</span></div>
        <div class="info-row"><span class="info-label">Local</span><span class="info-val">${p.local||"—"}</span></div>
        ${p.observacao?`<div class="info-row"><span class="info-label">Obs.</span><span class="info-val">${p.observacao}</span></div>`:""}
        <div class="prod-actions">
          <button class="btn-mov btn-entrada" onclick="abrirMovimentacao('${p.id}','${p.nome.replace(/'/g,'`')}','${p.unidade||''}','entrada')">📥 Entrada</button>
          <button class="btn-mov btn-saida" onclick="abrirMovimentacao('${p.id}','${p.nome.replace(/'/g,'`')}','${p.unidade||''}','saida')">📤 Saída</button>
          <button class="btn-mov btn-editar" onclick="abrirFormProduto('${p.id}')">✏️ Editar</button>
          <button class="btn-mov btn-del" onclick="deletarProduto('${p.id}')">🗑</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

function toggleProduto(id){
  const body=document.getElementById("body-"+id);
  const aberto=body.classList.contains("aberto");
  document.querySelectorAll(".produto-body").forEach(b=>b.classList.remove("aberto"));
  if(!aberto) body.classList.add("aberto");
}

function filtrarProdutos(){renderizarProdutos();}

function renderizarFiltroCategoria(){
  const sel=document.getElementById("filtro-cat");
  const atual=sel.value;
  sel.innerHTML=`<option value="">Todas categorias</option>`+categorias.map(c=>`<option value="${c}" ${c===atual?"selected":""}>${c}</option>`).join("");
}

// ===== FORM PRODUTO =====
function abrirFormProduto(id=null){
  produtoEditando = id ? produtos.find(p=>p.id===String(id)) : null;
  const p = produtoEditando || {};
  document.getElementById("modal-titulo").textContent = id ? "Editar Produto" : "Novo Produto";
  document.getElementById("modal-conteudo").innerHTML = `
    <div class="foto-upload">
      <div id="foto-prev" style="width:70px;height:70px;border-radius:10px;background:var(--bg3);border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;overflow:hidden;">
        ${p.foto?`<img src="${p.foto}" style="width:100%;height:100%;object-fit:cover;">`:"📦"}
      </div>
      <div>
        <label for="foto-file" class="btn-foto">📷 Foto do produto</label>
        <input type="file" id="foto-file" accept="image/*" style="display:none;" onchange="uploadFotoProduto(this)">
        <p style="font-size:11px;color:var(--text2);margin-top:6px;">ou cole o link:</p>
        <input type="url" id="f-foto" value="${p.foto||''}" placeholder="https://..." style="width:100%;padding:7px 10px;background:var(--bg3);border:1.5px solid #333;border-radius:8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:12px;margin-top:4px;">
      </div>
    </div>
    <label class="form-label">Nome do produto *</label>
    <input type="text" id="f-nome" class="form-input" value="${p.nome||''}" placeholder="Ex: Carne bovina 180g">
    <label class="form-label">Categoria</label>
    <select id="f-cat" class="form-select">
      ${categorias.map(c=>`<option value="${c}" ${c===(p.categoria||"")?"selected":""}>${c}</option>`).join("")}
    </select>
    <div class="form-row-2">
      <div>
        <label class="form-label">Quantidade atual *</label>
        <input type="number" id="f-qtd" class="form-input" value="${p.quantidade||0}" min="0" step="0.1">
      </div>
      <div>
        <label class="form-label">Unidade</label>
        <select id="f-unit" class="form-select">
          ${["un","kg","g","L","ml","cx","pct","fardo"].map(u=>`<option value="${u}" ${u===(p.unidade||"un")?"selected":""}>${u}</option>`).join("")}
        </select>
      </div>
    </div>
    <div class="form-row-2">
      <div>
        <label class="form-label">Qtd mínima (alerta)</label>
        <input type="number" id="f-qtdmin" class="form-input" value="${p.quantidade_minima||0}" min="0" step="0.1">
      </div>
      <div>
        <label class="form-label">Valor unitário (R$)</label>
        <input type="number" id="f-valor" class="form-input" value="${p.valor_unitario||0}" min="0" step="0.01">
      </div>
    </div>
    <label class="form-label">Fornecedor</label>
    <input type="text" id="f-fornecedor" class="form-input" value="${p.fornecedor||''}" placeholder="Ex: Distribuidora X">
    <label class="form-label">Local de armazenamento</label>
    <select id="f-local" class="form-select">
      ${["Geladeira","Freezer","Prateleira","Depósito","Câmara fria","Outro"].map(l=>`<option value="${l}" ${l===(p.local||"")?"selected":""}>${l}</option>`).join("")}
    </select>
    <label class="form-label">Validade</label>
    <input type="date" id="f-validade" class="form-input" value="${p.validade||''}">
    <label class="form-label">Observação</label>
    <textarea id="f-obs" class="form-textarea" placeholder="Ex: Troca do óleo da fritadeira, manutenção...">${p.observacao||''}</textarea>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn-salvar" onclick="salvarProduto()">💾 Salvar</button>
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
    </div>
  `;
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow="hidden";
}

async function uploadFotoProduto(input){
  const file=input.files[0];if(!file)return;
  const prev=document.getElementById("foto-prev");
  const campo=document.getElementById("f-foto");
  prev.innerHTML=`<div style="font-size:11px;color:var(--text2);">⏳</div>`;
  const form=new FormData();
  form.append("file",file);
  form.append("upload_preset",CLOUDINARY_PRESET);
  try{
    const resp=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`,{method:"POST",body:form});
    const data=await resp.json();
    if(data.secure_url){
      campo.value=data.secure_url;
      prev.innerHTML=`<img src="${data.secure_url}" style="width:100%;height:100%;object-fit:cover;">`;
      toast("✅ Foto enviada!");
    }
  }catch(e){toast("❌ Erro no upload","var(--red)");}
}

async function salvarProduto(){
  const nome=document.getElementById("f-nome").value.trim();
  if(!nome)return toast("⚠️ Informe o nome do produto","#888");
  const dados={
    acao:"produto",
    id: produtoEditando?.id||null,
    nome,
    categoria:document.getElementById("f-cat").value,
    quantidade:document.getElementById("f-qtd").value,
    unidade:document.getElementById("f-unit").value,
    quantidade_minima:document.getElementById("f-qtdmin").value,
    valor_unitario:document.getElementById("f-valor").value,
    fornecedor:document.getElementById("f-fornecedor").value.trim(),
    local:document.getElementById("f-local").value,
    validade:document.getElementById("f-validade").value,
    foto:document.getElementById("f-foto").value.trim(),
    observacao:document.getElementById("f-obs").value.trim(),
  };
  try{
    await chamarPost(dados);
    toast("✅ Produto salvo!");
    fecharModal();
    await carregarTudo();
  }catch(e){toast("❌ Erro ao salvar","var(--red)");}
}

async function deletarProduto(id){
  if(!confirm("Remover este produto do estoque?"))return;
  try{
    await chamarPost({acao:"deletar_produto",id});
    toast("🗑 Produto removido.");
    await carregarTudo();
  }catch(e){toast("❌ Erro ao remover","var(--red)");}
}

// ===== MOVIMENTAÇÃO =====
function abrirMovimentacao(prodId, prodNome, unidade, tipo){
  document.getElementById("modal-titulo").textContent = tipo==="entrada"?"📥 Entrada de Estoque":"📤 Saída de Estoque";
  document.getElementById("modal-conteudo").innerHTML=`
    <div style="background:var(--bg3);border-radius:10px;padding:14px;margin-bottom:16px;">
      <div style="font-size:13px;color:var(--text2);">Produto</div>
      <div style="font-size:16px;font-weight:800;">${prodNome}</div>
    </div>
    <label class="form-label">Quantidade (${unidade})</label>
    <input type="number" id="mov-qtd" class="form-input" value="1" min="0.1" step="0.1" placeholder="Ex: 5">
    <label class="form-label">Valor unitário pago (R$)</label>
    <input type="number" id="mov-valor" class="form-input" value="0" min="0" step="0.01" placeholder="Ex: 12.50">
    <label class="form-label">Observação</label>
    <input type="text" id="mov-obs" class="form-input" placeholder="Ex: Compra no mercado X, troca de óleo...">
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn-salvar" style="background:${tipo==="entrada"?"var(--green)":"var(--red)"};" onclick="confirmarMovimentacao('${prodId}','${prodNome.replace(/'/g,'`')}','${tipo}')">
        ${tipo==="entrada"?"📥 Confirmar entrada":"📤 Confirmar saída"}
      </button>
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
    </div>
  `;
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow="hidden";
}

async function confirmarMovimentacao(prodId, prodNome, tipo){
  const qtd=parseFloat(document.getElementById("mov-qtd").value)||0;
  if(qtd<=0)return toast("⚠️ Informe a quantidade","#888");
  try{
    await chamarPost({
      acao:"movimentacao",
      produto_id:prodId,
      produto_nome:prodNome,
      tipo,
      quantidade:qtd,
      valor_unitario:document.getElementById("mov-valor").value||0,
      observacao:document.getElementById("mov-obs").value.trim(),
    });
    toast(tipo==="entrada"?"✅ Entrada registrada!":"✅ Saída registrada!");
    fecharModal();
    await carregarTudo();
  }catch(e){toast("❌ Erro ao registrar","var(--red)");}
}

// ===== MOVIMENTAÇÕES =====
async function carregarMovimentacoes(){
  const lista=document.getElementById("lista-movimentacoes");
  lista.innerHTML=`<div class="loading-box"><div class="spinner"></div>Carregando...</div>`;
  try{
    const res=await chamarGet({acao:"movimentacoes"});
    if(!res.ok)throw new Error(res.erro);
    const movs=(res.movimentacoes||[]).reverse().slice(0,50);
    if(!movs.length){lista.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text2);">Nenhuma movimentação ainda.</div>`;return;}
    lista.innerHTML=movs.map(m=>`
      <div class="mov-item">
        <div class="mov-tipo ${m.tipo}">${m.tipo==="entrada"?"📥":"📤"}</div>
        <div class="mov-info">
          <div class="mov-nome">${m.produto_nome}</div>
          <div class="mov-det">${m.data} ${m.observacao?`• ${m.observacao}`:""}</div>
        </div>
        <div class="mov-qtd ${m.tipo}">${m.tipo==="entrada"?"+":"-"}${m.quantidade}</div>
      </div>
    `).join("");
  }catch(e){lista.innerHTML=`<div style="text-align:center;padding:40px;color:var(--red);">❌ Erro ao carregar.</div>`;}
}

// ===== CATEGORIAS =====
function renderizarCategorias(){
  document.getElementById("lista-categorias-edit").innerHTML=categorias.map((c,i)=>`
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;">
      <input type="text" value="${c}" data-idx="${i}" style="flex:1;padding:10px 14px;background:var(--bg2);border:1.5px solid #333;border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;">
      <button onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;">✕</button>
    </div>
  `).join("");
}

function novaCategoria(){
  const div=document.createElement("div");
  div.style.cssText="display:flex;gap:10px;align-items:center;margin-bottom:8px;";
  div.innerHTML=`<input type="text" placeholder="Nova categoria" style="flex:1;padding:10px 14px;background:var(--bg2);border:1.5px solid #333;border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;"><button onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;">✕</button>`;
  document.getElementById("lista-categorias-edit").appendChild(div);
}

async function salvarCategorias(){
  const inputs=document.querySelectorAll("#lista-categorias-edit input");
  const cats=Array.from(inputs).map(i=>i.value.trim()).filter(Boolean);
  try{
    await chamarPost({acao:"categorias",categorias:cats});
    categorias=cats;
    renderizarFiltroCategoria();
    toast("✅ Categorias salvas!");
  }catch(e){toast("❌ Erro ao salvar","var(--red)");}
}

// ===== MODAL =====
function fecharModal(){
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow="";
}
document.getElementById("modal-overlay").onclick=e=>{
  if(e.target===document.getElementById("modal-overlay"))fecharModal();
};
</script>
</body>
</html>
