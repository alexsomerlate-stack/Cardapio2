<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardápio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #D0401A; --brand-dark: #A8300F; --brand-light: #FF6B3D;
    --bg: #0D0D0D; --bg2: #1A1A1A; --bg3: #242424;
    --text: #F5F0E8; --text2: #B0A898; --gold: #F2A92B; --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  #hero { position:relative; background:var(--bg); padding:24px 20px 0; text-align:center; }
  #hero-logo {
    width:120px; height:120px; border-radius:50%; object-fit:cover;
    border:3px solid var(--brand); display:block; margin:0 auto 10px; background:var(--bg3);
  }
  #hero-logo-placeholder {
    width:120px; height:120px; border-radius:50%; background:var(--bg3);
    border:3px solid var(--brand); display:flex; align-items:center; justify-content:center;
    margin:0 auto 10px; font-family:'Bebas Neue',sans-serif; font-size:14px; color:var(--brand); letter-spacing:1px;
  }
  #hero-name { font-family:'Bebas Neue',sans-serif; font-size:42px; letter-spacing:3px; color:var(--text); line-height:1; margin-bottom:4px; }
  #hero-slogan { font-size:13px; color:var(--text2); letter-spacing:1px; text-transform:uppercase; margin-bottom:18px; }

  #video-wrap { width:100%; max-width:600px; margin:0 auto 24px; border-radius:var(--radius); overflow:hidden; background:var(--bg3); aspect-ratio:16/7; display:flex; align-items:center; justify-content:center; }
  #video-wrap iframe, #video-wrap video { width:100%; height:100%; border:none; }
  #video-placeholder { width:100%; max-width:600px; margin:0 auto 24px; border-radius:var(--radius); background:var(--bg3); border:1.5px dashed #333; aspect-ratio:16/7; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--text2); font-size:13px; }
  .play-icon { font-size:36px; opacity:.4; }

  #categorias { display:flex; gap:10px; padding:0 16px 20px; overflow-x:auto; scrollbar-width:none; max-width:700px; margin:0 auto; }
  #categorias::-webkit-scrollbar { display:none; }
  .cat-btn { flex-shrink:0; padding:9px 18px; border-radius:50px; border:1.5px solid #333; background:var(--bg2); color:var(--text2); font-family:'Nunito',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all .2s; white-space:nowrap; }
  .cat-btn:hover { border-color:var(--brand); color:var(--text); }
  .cat-btn.ativo { background:var(--brand); border-color:var(--brand); color:#fff; }

  #produtos-section { padding:0 16px 120px; max-width:700px; margin:0 auto; }
  #cat-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; color:var(--brand); margin-bottom:16px; }
  #grid-produtos { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; }
  .card-produto { background:var(--bg2); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:transform .2s,box-shadow .2s; border:1.5px solid transparent; }
  .card-produto:hover { transform:translateY(-3px); border-color:var(--brand); }
  .card-produto img { width:100%; aspect-ratio:1; object-fit:cover; background:var(--bg3); }
  .card-info { padding:10px 10px 12px; }
  .card-nome { font-size:13px; font-weight:800; line-height:1.3; margin-bottom:4px; }
  .card-preco { font-size:15px; font-weight:700; color:var(--gold); }
  .card-desc { font-size:11px; color:var(--text2); margin-top:3px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  #modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:100; overflow-y:auto; padding:20px 16px 100px; }
  #modal-overlay.open { display:flex; align-items:flex-start; justify-content:center; }
  #modal-box { background:var(--bg2); border-radius:20px; width:100%; max-width:480px; overflow:hidden; position:relative; margin-top:20px; }
  #modal-img { width:100%; aspect-ratio:4/3; object-fit:cover; background:var(--bg3); }
  #modal-body { padding:20px; }
  #modal-nome { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:2px; }
  #modal-preco { font-size:22px; font-weight:800; color:var(--gold); margin:6px 0 10px; }
  #modal-desc { font-size:14px; color:var(--text2); line-height:1.7; margin-bottom:18px; }
  #modal-close { position:absolute; top:12px; right:12px; width:36px; height:36px; border-radius:50%; background:rgba(0,0,0,.6); border:none; color:#fff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .add-titulo { font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--text2); margin-bottom:10px; }
  #lista-adicionais { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
  .add-chip { padding:7px 14px; border-radius:50px; border:1.5px solid #333; background:var(--bg3); font-size:12px; font-weight:700; cursor:pointer; transition:all .15s; color:var(--text2); }
  .add-chip:hover { border-color:var(--brand); color:var(--text); }
  .add-chip.sel { background:var(--brand); border-color:var(--brand); color:#fff; }
  #modal-footer { display:flex; align-items:center; gap:12px; }
  .qtd-box { display:flex; align-items:center; gap:0; background:var(--bg3); border-radius:50px; overflow:hidden; }
  .qtd-btn { width:38px; height:38px; background:none; border:none; color:var(--text); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .qtd-btn:hover { background:var(--bg2); }
  #modal-qtd { font-size:16px; font-weight:700; width:32px; text-align:center; }
  #btn-add-carrinho { flex:1; padding:12px 20px; background:var(--brand); border:none; border-radius:50px; color:#fff; font-family:'Nunito',sans-serif; font-size:15px; font-weight:800; cursor:pointer; transition:background .2s; }
  #btn-add-carrinho:hover { background:var(--brand-dark); }

  #cart-btn { position:fixed; bottom:24px; right:20px; width:60px; height:60px; background:var(--brand); border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:200; box-shadow:0 4px 20px rgba(208,64,26,.5); transition:transform .2s; }
  #cart-btn:hover { transform:scale(1.08); }
  #cart-btn svg { width:26px; height:26px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  #cart-badge { position:absolute; top:-4px; right:-4px; background:var(--gold); color:#000; border-radius:50%; width:22px; height:22px; font-size:12px; font-weight:800; display:none; align-items:center; justify-content:center; }

  #cart-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:300; align-items:flex-end; justify-content:center; }
  #cart-modal.open { display:flex; }
  #cart-box { background:var(--bg2); border-radius:24px 24px 0 0; width:100%; max-width:520px; max-height:92vh; overflow-y:auto; padding:20px 20px 32px; }
  #cart-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  #cart-header h2 { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; }
  #cart-close { background:var(--bg3); border:none; color:var(--text); width:34px; height:34px; border-radius:50%; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .cart-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid #2a2a2a; }
  .cart-item img { width:56px; height:56px; border-radius:10px; object-fit:cover; background:var(--bg3); flex-shrink:0; }
  .cart-item-info { flex:1; }
  .cart-item-nome { font-size:14px; font-weight:700; }
  .cart-item-adds { font-size:11px; color:var(--text2); margin-top:2px; }
  .cart-item-preco { font-size:14px; font-weight:800; color:var(--gold); }
  .cart-qtd-box { display:flex; align-items:center; gap:6px; margin-top:6px; }
  .cqb { background:var(--bg3); border:none; color:var(--text); width:28px; height:28px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .cqb:hover { background:var(--brand); }
  .cq-num { font-size:14px; font-weight:700; min-width:20px; text-align:center; }
  #cart-empty { text-align:center; padding:40px 0; color:var(--text2); font-size:15px; }

  #entrega-box { background:var(--bg3); border-radius:14px; padding:16px; margin:16px 0; }
  #entrega-box label { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text2); display:block; margin-bottom:8px; }
  #entrega-input { width:100%; background:var(--bg2); border:1.5px solid #333; border-radius:10px; color:var(--text); font-family:'Nunito',sans-serif; font-size:14px; padding:10px 14px; }
  #entrega-input:focus { outline:none; border-color:var(--brand); }
  #entrega-aviso { font-size:12px; color:var(--text2); margin-top:8px; line-height:1.5; }

  #cart-total-row { display:flex; justify-content:space-between; align-items:center; margin:16px 0 12px; }
  #cart-total-label { font-size:14px; color:var(--text2); }
  #cart-total-val { font-size:22px; font-weight:800; color:var(--gold); }
  #btn-wpp { width:100%; padding:15px; background:#25D366; border:none; border-radius:50px; color:#fff; font-family:'Nunito',sans-serif; font-size:16px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:background .2s; }
  #btn-wpp:hover { background:#1da851; }
  #btn-wpp svg { width:22px; height:22px; fill:#fff; }

  #loading { text-align:center; padding:60px 20px; color:var(--text2); font-size:15px; }
  .spinner { width:36px; height:36px; border:3px solid #333; border-top-color:var(--brand); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media (max-width:480px) {
    #grid-produtos { grid-template-columns:repeat(2,1fr); }
    #modal-nome { font-size:26px; }
  }
</style>
</head>
<body>

<section id="hero">
  <div id="logo-container"></div>
  <h1 id="hero-name"></h1>
  <p id="hero-slogan"></p>
  <div id="video-container"></div>
  <div id="categorias"></div>
</section>

<section id="produtos-section">
  <div id="cat-title"></div>
  <div id="loading"><div class="spinner"></div>Carregando cardápio...</div>
  <div id="grid-produtos" style="display:none;"></div>
  <div id="sem-produtos" style="display:none;color:var(--text2);text-align:center;padding:40px 0;">Esta categoria não possui produtos no momento.</div>
</section>

<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close">✕</button>
    <img id="modal-img" src="" alt="">
    <div id="modal-body">
      <h2 id="modal-nome"></h2>
      <div id="modal-preco"></div>
      <p id="modal-desc"></p>
      <div class="add-titulo">Adicionais</div>
      <div id="lista-adicionais"></div>
      <div id="modal-footer">
        <div class="qtd-box">
          <button class="qtd-btn" id="qtd-minus">−</button>
          <span id="modal-qtd">1</span>
          <button class="qtd-btn" id="qtd-plus">+</button>
        </div>
        <button id="btn-add-carrinho">Adicionar ao carrinho</button>
      </div>
    </div>
  </div>
</div>

<button id="cart-btn">
  <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
  <div id="cart-badge"></div>
</button>

<div id="cart-modal">
  <div id="cart-box">
    <div id="cart-header">
      <h2>Seu Pedido</h2>
      <button id="cart-close">✕</button>
    </div>
    <div id="cart-items-list"></div>
    <div id="entrega-box">
      <label>📍 Endereço de entrega</label>
      <input type="text" id="entrega-input" placeholder="Rua, número, bairro...">
      <p id="entrega-aviso">⚠️ <span id="taxa-texto"></span></p>
    </div>
    <div id="cart-total-row">
      <span id="cart-total-label">Total dos itens</span>
      <span id="cart-total-val">R$ 0,00</span>
    </div>
    <button id="btn-wpp">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Finalizar pelo WhatsApp
    </button>
  </div>
</div>

<script>
// ===== DADOS DO PAINEL =====
const DEFAULTS = {
  config: { nome:"BURGER HOUSE", slogan:"Feito com fogo. Servido com amor.", logo:"", video:"", wpp:"5531999999999", taxa:"A taxa de entrega varia conforme o bairro e será informada pelo atendente." },
  categorias: ["Sobremesa","Bebidas","Baratíssimos","Especiais","Combo Individual","Combo Casal/Família"],
  adicionais: [
    { nome:"Bacon", preco:3.00 },{ nome:"Molho especial", preco:2.00 },{ nome:"Carne extra", preco:8.00 },
    { nome:"Queijo cheddar", preco:3.50 },{ nome:"Cebola caramelizada", preco:2.50 },{ nome:"Ovo frito", preco:2.00 },
  ],
  produtos: [
    { id:1, nome:"Classic Burger", categoria:"Especiais", preco:29.90, descricao:"Pão brioche, blend 180g, queijo prato, alface, tomate e molho da casa.", foto:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&q=80", ativo:true },
    { id:2, nome:"Coca-Cola 350ml", categoria:"Bebidas", preco:6.00, descricao:"Gelada, na latinha.", foto:"https://images.unsplash.com/photo-1554866585-cd94860890b7?w=400&q=80", ativo:true },
    { id:3, nome:"Mini Burger", categoria:"Baratíssimos", preco:14.90, descricao:"Versão menor do nosso clássico!", foto:"https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=400&q=80", ativo:true },
  ]
};

function getDados(chave) {
  try { const d = localStorage.getItem('bh_'+chave); return d ? JSON.parse(d) : DEFAULTS[chave]; }
  catch { return DEFAULTS[chave]; }
}

let produtos = [], carrinho = [], catAtiva = "", produtoAtual = null, qtdAtual = 1, adicionaisSel = [];
let ADICIONAIS = [], CFG = {};

document.addEventListener("DOMContentLoaded", () => {
  CFG = getDados("config");
  ADICIONAIS = getDados("adicionais");
  produtos = (getDados("produtos") || []).filter(p => p.ativo);

  aplicarConfig();
  inicializarCategorias();

  document.getElementById("modal-close").onclick = fecharModal;
  document.getElementById("modal-overlay").onclick = (e) => { if(e.target===document.getElementById("modal-overlay")) fecharModal(); };
  document.getElementById("cart-btn").onclick = abrirCarrinho;
  document.getElementById("cart-close").onclick = () => document.getElementById("cart-modal").classList.remove("open");
  document.getElementById("cart-modal").onclick = (e) => { if(e.target===document.getElementById("cart-modal")) document.getElementById("cart-modal").classList.remove("open"); };
  document.getElementById("qtd-minus").onclick = () => { if(qtdAtual>1){qtdAtual--;document.getElementById("modal-qtd").textContent=qtdAtual;} };
  document.getElementById("qtd-plus").onclick = () => { qtdAtual++;document.getElementById("modal-qtd").textContent=qtdAtual; };
  document.getElementById("btn-add-carrinho").onclick = adicionarAoCarrinho;
  document.getElementById("btn-wpp").onclick = enviarWhatsApp;
  document.getElementById("taxa-texto").textContent = CFG.taxa || "";
});

function aplicarConfig() {
  document.title = CFG.nome || "Cardápio";
  document.getElementById("hero-name").textContent = CFG.nome || "";
  document.getElementById("hero-slogan").textContent = CFG.slogan || "";

  const lc = document.getElementById("logo-container");
  if (CFG.logo) lc.innerHTML = `<img id="hero-logo" src="${CFG.logo}" alt="Logo">`;
  else lc.innerHTML = `<div id="hero-logo-placeholder">LOGO</div>`;

  const vc = document.getElementById("video-container");
  if (CFG.video) {
    const isYT = CFG.video.includes("youtube") || CFG.video.includes("youtu.be");
    if (isYT) {
      let vId = CFG.video.split("v=")[1] || CFG.video.split("/").pop().split("?")[0];
      vc.innerHTML = `<div id="video-wrap"><iframe src="https://www.youtube.com/embed/${vId}?autoplay=1&mute=1&loop=1&playlist=${vId}" allow="autoplay" allowfullscreen></iframe></div>`;
    } else {
      vc.innerHTML = `<div id="video-wrap"><video src="${CFG.video}" autoplay muted loop playsinline></video></div>`;
    }
  } else {
    vc.innerHTML = `<div id="video-placeholder"><div class="play-icon">▶</div><span>Configure um vídeo no painel do gerente</span></div>`;
  }
}

function inicializarCategorias() {
  document.getElementById("loading").style.display = "none";
  const todasCats = getDados("categorias");
  const catsComProd = todasCats.filter(c => produtos.some(p => p.categoria.trim().toLowerCase() === c.trim().toLowerCase()));
  const cont = document.getElementById("categorias");
  cont.innerHTML = "";
  catsComProd.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (i===0?" ativo":"");
    btn.textContent = c;
    btn.onclick = () => selecionarCategoria(c, btn);
    cont.appendChild(btn);
  });
  if (catsComProd.length > 0) selecionarCategoria(catsComProd[0], cont.querySelector(".cat-btn"));
}

function selecionarCategoria(cat, btn) {
  catAtiva = cat;
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");
  document.getElementById("cat-title").textContent = cat;
  renderizarProdutos();
}

function renderizarProdutos() {
  const grid = document.getElementById("grid-produtos");
  const sem = document.getElementById("sem-produtos");
  const filtrados = produtos.filter(p => p.categoria.trim().toLowerCase() === catAtiva.trim().toLowerCase());
  if (!filtrados.length) { grid.style.display="none"; sem.style.display="block"; return; }
  sem.style.display="none"; grid.style.display="grid";
  grid.innerHTML = filtrados.map(p => `
    <div class="card-produto" onclick="abrirModal(${p.id})">
      <img src="${p.foto||''}" alt="${p.nome}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23242424%22 width=%22100%22 height=%22100%22/><text y=%2250%25%22 x=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23555%22 font-size=%2230%22>🍔</text></svg>'">
      <div class="card-info">
        <div class="card-nome">${p.nome}</div>
        <div class="card-preco">R$ ${p.preco.toFixed(2).replace(".",",")}</div>
        <div class="card-desc">${p.descricao}</div>
      </div>
    </div>
  `).join("");
}

function abrirModal(id) {
  produtoAtual = produtos.find(p => p.id===id); if(!produtoAtual) return;
  qtdAtual=1; adicionaisSel=[];
  document.getElementById("modal-qtd").textContent="1";
  document.getElementById("modal-img").src=produtoAtual.foto||"";
  document.getElementById("modal-nome").textContent=produtoAtual.nome;
  document.getElementById("modal-preco").textContent="R$ "+produtoAtual.preco.toFixed(2).replace(".",",");
  document.getElementById("modal-desc").textContent=produtoAtual.descricao;
  const la=document.getElementById("lista-adicionais");
  la.innerHTML=ADICIONAIS.map((a,i)=>`<div class="add-chip" data-idx="${i}" onclick="toggleAdd(this,${i})">${a.nome} +R$ ${a.preco.toFixed(2).replace(".",",")}</div>`).join("");
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow="hidden";
}
function fecharModal(){document.getElementById("modal-overlay").classList.remove("open");document.body.style.overflow="";}
function toggleAdd(el,idx){const i=adicionaisSel.indexOf(idx);if(i===-1){adicionaisSel.push(idx);el.classList.add("sel");}else{adicionaisSel.splice(i,1);el.classList.remove("sel");}}
function adicionarAoCarrinho(){
  if(!produtoAtual) return;
  const adds=adicionaisSel.map(i=>ADICIONAIS[i]);
  const extra=adds.reduce((s,a)=>s+a.preco,0);
  carrinho.push({id:Date.now(),produto:produtoAtual,qtd:qtdAtual,adicionais:adds,precoUnit:produtoAtual.preco+extra});
  atualizarBadge(); fecharModal();
  const btn=document.getElementById("cart-btn"); btn.style.transform="scale(1.2)"; setTimeout(()=>btn.style.transform="",200);
}
function atualizarBadge(){const t=carrinho.reduce((s,i)=>s+i.qtd,0);const b=document.getElementById("cart-badge");b.textContent=t;b.style.display=t?"flex":"none";}
function abrirCarrinho(){renderizarCarrinho();document.getElementById("cart-modal").classList.add("open");}
function renderizarCarrinho(){
  const lista=document.getElementById("cart-items-list");
  if(!carrinho.length){lista.innerHTML=`<div id="cart-empty">Carrinho vazio 🛒<br><small>Adicione produtos para começar!</small></div>`;document.getElementById("cart-total-val").textContent="R$ 0,00";return;}
  lista.innerHTML=carrinho.map(item=>`
    <div class="cart-item">
      <img src="${item.produto.foto||''}" alt="" onerror="this.style.background='#2a2a2a'">
      <div class="cart-item-info">
        <div class="cart-item-nome">${item.produto.nome}</div>
        ${item.adicionais.length?`<div class="cart-item-adds">+ ${item.adicionais.map(a=>a.nome).join(", ")}</div>`:""}
        <div class="cart-qtd-box">
          <button class="cqb" onclick="alterarQtd(${item.id},-1)">−</button>
          <span class="cq-num">${item.qtd}</span>
          <button class="cqb" onclick="alterarQtd(${item.id},1)">+</button>
        </div>
      </div>
      <div class="cart-item-preco">R$ ${(item.precoUnit*item.qtd).toFixed(2).replace(".",",")}</div>
    </div>
  `).join("");
  const total=carrinho.reduce((s,i)=>s+i.precoUnit*i.qtd,0);
  document.getElementById("cart-total-val").textContent="R$ "+total.toFixed(2).replace(".",",");
}
function alterarQtd(id,delta){const idx=carrinho.findIndex(i=>i.id===id);if(idx===-1)return;carrinho[idx].qtd+=delta;if(carrinho[idx].qtd<=0)carrinho.splice(idx,1);atualizarBadge();renderizarCarrinho();}
function registrarPedido(endereco, total) {
  const hoje = new Date();
  const dataStr = hoje.toISOString().slice(0,10);
  const horaStr = hoje.toTimeString().slice(0,5);

  const pedidos = (() => { try { return JSON.parse(localStorage.getItem('bh_pedidos')) || []; } catch { return []; } })();
  const doDia = pedidos.filter(p => p.data === dataStr);
  const num = doDia.length + 1;

  const adicionaisTodos = carrinho.filter(i => i.adicionais.length).map(i => i.adicionais.map(a=>a.nome).join(", ")).join(", ");

  pedidos.push({
    id: Date.now().toString(),
    num,
    data: dataStr,
    hora: horaStr,
    status: "pendente",
    total,
    endereco,
    itens: carrinho.map(i => ({ nome: i.produto.nome, qtd: i.qtd })),
    adicionais: adicionaisTodos || null,
  });
  localStorage.setItem('bh_pedidos', JSON.stringify(pedidos));
}

function enviarWhatsApp(){
  if(!carrinho.length)return alert("Adicione itens ao carrinho primeiro!");
  const end=document.getElementById("entrega-input").value.trim();
  if(!end){alert("Por favor, informe o endereço de entrega.");document.getElementById("entrega-input").focus();return;}
  const total=carrinho.reduce((s,i)=>s+i.precoUnit*i.qtd,0);
  registrarPedido(end, total);
  let msg=`🍔 *Novo Pedido — ${CFG.nome}*\n\n📋 *Itens:*\n`;
  carrinho.forEach(item=>{
    msg+=`• ${item.qtd}x ${item.produto.nome} — R$ ${(item.precoUnit*item.qtd).toFixed(2).replace(".",",")}\n`;
    if(item.adicionais.length)msg+=`  _Adicionais: ${item.adicionais.map(a=>a.nome).join(", ")}_\n`;
  });
  msg+=`\n💰 *Subtotal: R$ ${total.toFixed(2).replace(".",",")}*\n⚠️ _Taxa de entrega será informada separadamente_\n\n📍 *Endereço: ${end}*`;
  window.open(`https://wa.me/${CFG.wpp||""}?text=${encodeURIComponent(msg)}`,"_blank");
}
</script>
