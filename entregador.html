<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Motoboy — Quality Burger</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --brand:#D0401A; --brand-dark:#A8300F;
  --bg:#0D0D0D; --bg2:#1A1A1A; --bg3:#242424; --bg4:#2e2e2e;
  --text:#F5F0E8; --text2:#B0A898;
  --gold:#F2A92B; --green:#2ECC71; --red:#E74C3C;
  --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--bg2);border-radius:20px;padding:36px 28px;width:100%;max-width:340px;border:1.5px solid #2a2a2a;text-align:center;}
.login-box h1{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:var(--brand);margin-bottom:4px;}
.login-box p{font-size:13px;color:var(--text2);margin-bottom:24px;}
.login-box input{width:100%;padding:13px 16px;background:var(--bg3);border:1.5px solid #333;border-radius:var(--radius);color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;margin-bottom:12px;}
.login-box input:focus{outline:none;border-color:var(--brand);}
.btn-entrar{width:100%;padding:13px;background:var(--brand);border:none;border-radius:50px;color:#fff;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;}
#login-erro{color:var(--red);font-size:13px;margin-top:8px;display:none;}

/* TOPBAR */
#app{display:none;}
#topbar{background:var(--bg2);border-bottom:1.5px solid #2a2a2a;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
#topbar h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--brand);}
#btn-sair{background:var(--bg3);border:1px solid #333;color:var(--text2);padding:7px 14px;border-radius:50px;cursor:pointer;font-size:12px;font-family:'Nunito',sans-serif;}

/* STATUS BAR */
#status-bar{display:flex;gap:10px;padding:14px 14px 0;}
.stat-box{flex:1;background:var(--bg2);border-radius:12px;padding:12px;text-align:center;border:1.5px solid #2a2a2a;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:26px;}
.stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;}

/* SEÇÕES */
#conteudo{padding:14px;}
.sec-titulo{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;color:var(--text2);margin:16px 0 10px;}

/* CARD DE ENTREGA */
.entrega-card{background:var(--bg2);border-radius:var(--radius);border:1.5px solid #2a2a2a;padding:16px;margin-bottom:12px;}
.entrega-card.em-rota{border-color:var(--brand);}
.entrega-card.concluida{border-color:#2a3a2a;}
.entrega-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--brand);}
.entrega-hora{font-size:11px;color:var(--text2);}
.entrega-cliente{font-size:14px;font-weight:800;margin:6px 0 2px;}
.entrega-end{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5;}
.entrega-itens{font-size:12px;color:var(--text2);margin-bottom:12px;padding:8px 10px;background:var(--bg3);border-radius:8px;}

/* BOTÕES */
.btns{display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:10px 14px;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;flex:1;min-width:120px;text-align:center;}
.btn-chegou{background:#444;color:#fff;}
.btn-entregue{background:var(--green);color:#fff;}
.btn-nao{background:var(--bg3);border:1.5px solid var(--red);color:var(--red);}
.btn-nav{background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;}
.badge{display:inline-block;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:800;}
.badge-rota{background:#3a1a0a;color:var(--brand);}
.badge-entregue{background:#1a3a1a;color:var(--green);}
.badge-nao{background:#3a1a1a;color:var(--red);}

/* VAZIO */
.vazio{text-align:center;padding:30px;color:var(--text2);font-size:13px;}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:12px 22px;border-radius:50px;font-size:13px;font-weight:700;z-index:999;transition:transform .3s;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}

/* ATUALIZAR */
#btn-refresh{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:16px;padding:13px;background:var(--bg3);border:1.5px solid #333;border-radius:50px;color:var(--text2);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}

/* Spinner */
.spin{display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>🛵 MOTOBOY</h1>
    <p>Quality+ Burger — Entregas</p>
    <input type="text" id="l-user" placeholder="Usuário" autocomplete="username">
    <input type="password" id="l-pass" placeholder="Senha" autocomplete="current-password">
    <button class="btn-entrar" onclick="login()">Entrar</button>
    <div id="login-erro">Usuário ou senha incorretos.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="topbar">
    <h1>🛵 ENTREGAS</h1>
    <button id="btn-sair" onclick="logout()">Sair</button>
  </div>

  <div id="status-bar">
    <div class="stat-box">
      <div class="stat-num" id="st-rota" style="color:var(--brand)">0</div>
      <div class="stat-label">Em rota</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="st-ok" style="color:var(--green)">0</div>
      <div class="stat-label">Entregues</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="st-tempo" style="color:var(--gold)">—</div>
      <div class="stat-label">Tempo médio</div>
    </div>
  </div>

  <div id="conteudo">
    <div class="sec-titulo">EM ROTA AGORA</div>
    <div id="lista-rota"><div class="vazio">Nenhuma entrega em andamento.</div></div>

    <div class="sec-titulo">CONCLUÍDAS HOJE</div>
    <div id="lista-concluidas"><div class="vazio">Nenhuma entrega concluída ainda.</div></div>

    <button id="btn-refresh" onclick="carregar()">🔄 Atualizar entregas</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ===== CONFIG =====
// Credenciais do motoboy (separadas do gerente)
const CREDS_MOTOBOY = { usuario:"motoboy", senha:"moto123" };
const PROXY_URL = "https://qualityburguer.com.br/zapi-proxy.php";

function getZapi(){ try{ return JSON.parse(localStorage.getItem('bh_zapi'))||{}; }catch{return{};} }

// ===== LOGIN =====
document.getElementById("l-user").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("l-pass").focus();});
document.getElementById("l-pass").addEventListener("keydown",e=>{if(e.key==="Enter")login();});

function login(){
  const u=document.getElementById("l-user").value.trim();
  const s=document.getElementById("l-pass").value;
  // Aceita credenciais do motoboy OU do gerente (flexibilidade)
  const creds = JSON.parse(localStorage.getItem('bh_credenciais')||'null') || {usuario:"admin",senha:"1234"};
  if((u===CREDS_MOTOBOY.usuario&&s===CREDS_MOTOBOY.senha)||(u===creds.usuario&&s===creds.senha)){
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app").style.display="block";
    carregar();
    // Auto-refresh a cada 30s
    setInterval(carregar, 30000);
  } else {
    document.getElementById("login-erro").style.display="block";
  }
}
function logout(){
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("app").style.display="none";
  document.getElementById("l-user").value="";
  document.getElementById("l-pass").value="";
}

// ===== TOAST =====
function toast(msg,cor="var(--green)"){
  const t=document.getElementById("toast");
  t.textContent=msg; t.style.background=cor;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2800);
}

// ===== TEMPO =====
function hojeStr(){
  const a=new Date(new Date().toLocaleString("en-US",{timeZone:"America/Sao_Paulo"}));
  return a.getFullYear()+"-"+String(a.getMonth()+1).padStart(2,"0")+"-"+String(a.getDate()).padStart(2,"0");
}
function agora(){
  const a=new Date(new Date().toLocaleString("en-US",{timeZone:"America/Sao_Paulo"}));
  return String(a.getHours()).padStart(2,"0")+":"+String(a.getMinutes()).padStart(2,"0");
}
function diffMin(h1,h2){
  if(!h1||!h2) return null;
  const [hA,mA]=h1.split(":").map(Number);
  const [hB,mB]=h2.split(":").map(Number);
  return (hB*60+mB)-(hA*60+mA);
}

// ===== CARREGAR =====
function carregar(){
  const btn=document.getElementById("btn-refresh");
  btn.innerHTML='<span class="spin">⏳</span> Atualizando...';
  const todas=JSON.parse(localStorage.getItem('bh_entregas')||'[]');
  const hoje=hojeStr();
  const emRota=todas.filter(e=>e.status==="em_rota"||e.status==="chegou");
  const concluidas=todas.filter(e=>(e.status==="entregue"||e.status==="nao_encontrado")&&e.data===hoje);

  // Stats
  document.getElementById("st-rota").textContent=emRota.length;
  document.getElementById("st-ok").textContent=concluidas.filter(e=>e.status==="entregue").length;
  const tempos=concluidas.filter(e=>e.status==="entregue"&&e.hora_saida&&e.hora_entrega)
    .map(e=>diffMin(e.hora_saida,e.hora_entrega)).filter(t=>t&&t>0);
  document.getElementById("st-tempo").textContent=tempos.length
    ?Math.round(tempos.reduce((a,b)=>a+b,0)/tempos.length)+"min":"—";

  // Em rota
  const lr=document.getElementById("lista-rota");
  lr.innerHTML=emRota.length?emRota.map(e=>`
    <div class="entrega-card em-rota" id="card-${e.id}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div>
          <span class="entrega-num">#${String(e.num).padStart(2,"0")}</span>
          <span class="entrega-hora"> · Saiu ${e.hora_saida}</span>
        </div>
        <span class="badge badge-rota">🛵 EM ROTA</span>
      </div>
      <div class="entrega-cliente">👤 ${e.cliente}</div>
      <div class="entrega-end">📍 ${e.endereco}</div>
      <div class="entrega-itens">🛒 ${e.itens}</div>
      <div class="btns">
        <button class="btn btn-nav" onclick="abrirMapa('${encodeURIComponent(e.endereco)}')">🗺️ Navegar</button>
        <button class="btn btn-chegou" onclick="marcarChegou('${e.id}','${(e.telefone||'').replace(/'/g,"\\'")}')">📍 Cheguei</button>
      </div>
      <div class="btns" style="margin-top:8px;">
        <button class="btn btn-entregue" onclick="marcarEntregue('${e.id}','${(e.telefone||'').replace(/'/g,"\\'")}')">✅ Entregue</button>
        <button class="btn btn-nao" onclick="marcarNaoEncontrado('${e.id}','${(e.telefone||'').replace(/'/g,"\\'")}')">❌ Não encontrado</button>
      </div>
    </div>
  `).join(""):`<div class="vazio">Nenhuma entrega em andamento.</div>`;

  // Concluídas
  const lc=document.getElementById("lista-concluidas");
  const ord=[...concluidas].sort((a,b)=>(b.hora_entrega||"").localeCompare(a.hora_entrega||""));
  lc.innerHTML=ord.length?ord.map(e=>{
    const ok=e.status==="entregue";
    const tempo=diffMin(e.hora_saida,e.hora_entrega);
    return `<div class="entrega-card concluida">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span class="entrega-num" style="font-size:18px;">#${String(e.num).padStart(2,"0")}</span>
        <span class="badge ${ok?'badge-entregue':'badge-nao'}">${ok?"✅ ENTREGUE":"❌ NÃO ENCONTRADO"}</span>
      </div>
      <div style="font-size:13px;font-weight:700;">👤 ${e.cliente}</div>
      <div style="font-size:11px;color:var(--text2);">⏱️ ${e.hora_saida||"—"} → ${e.hora_entrega||"—"}${tempo?" ("+tempo+"min)":""}</div>
    </div>`;
  }).join(""):`<div class="vazio">Nenhuma entrega concluída ainda.</div>`;

  btn.innerHTML='🔄 Atualizar entregas';
}

// ===== NAVEGAÇÃO GPS =====
function abrirMapa(enderecoEnc){
  const end=decodeURIComponent(enderecoEnc);
  // Tenta abrir no Waze, fallback Google Maps
  const waze=`https://waze.com/ul?q=${encodeURIComponent(end)}&navigate=yes`;
  window.open(waze,"_blank");
}

// ===== AÇÕES =====
async function marcarChegou(id, fone){
  const entregas=JSON.parse(localStorage.getItem('bh_entregas')||'[]');
  const idx=entregas.findIndex(e=>e.id===id); if(idx===-1) return;
  entregas[idx].hora_chegada=agora();
  entregas[idx].status="chegou";
  localStorage.setItem('bh_entregas',JSON.stringify(entregas));

  // ✅ Envia SOMENTE ÁUDIO (sem texto antes)
  if(fone){
    const z=getZapi();
    if(z.audioUrl){
      await chamarProxy("send-audio",{phone:fone.replace(/\D/g,""),audio:z.audioUrl,waveform:true});
    }
  }
  toast("📍 Chegada registrada! Áudio enviado ao cliente.");
  carregar();
}

async function marcarEntregue(id, fone){
  const entregas=JSON.parse(localStorage.getItem('bh_entregas')||'[]');
  const idx=entregas.findIndex(e=>e.id===id); if(idx===-1) return;
  entregas[idx].status="entregue";
  entregas[idx].hora_entrega=agora();
  localStorage.setItem('bh_entregas',JSON.stringify(entregas));
  toast("✅ Entrega concluída!");
  carregar();
}

async function marcarNaoEncontrado(id, fone){
  const entregas=JSON.parse(localStorage.getItem('bh_entregas')||'[]');
  const idx=entregas.findIndex(e=>e.id===id); if(idx===-1) return;
  entregas[idx].status="nao_encontrado";
  entregas[idx].hora_entrega=agora();
  localStorage.setItem('bh_entregas',JSON.stringify(entregas));
  toast("❌ Registrado como não encontrado.","var(--red)");
  carregar();
}

async function chamarProxy(endpoint, payload){
  const z=getZapi();
  if(!z.instance||!z.token||!z.clientToken) return;
  try{
    await fetch(PROXY_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({endpoint,payload,instance:z.instance,token:z.token,clientToken:z.clientToken})
    });
  }catch(e){ console.warn("Proxy falha:",e.message); }
}
</script>
</body>
</html>
